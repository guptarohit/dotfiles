# yaml-language-server: $schema=https://json.schemastore.org/lazydocker.json
gui:
  scrollHeight: 2
  language: "auto"
  border: "rounded"
  theme:
    activeBorderColor:
      - green
    inactiveBorderColor:
      - default
  showAllContainers: false
  containerStatusHealthStyle: "long"

logs:
  timestamps: false
  since: "60m"

stats:
  graphs:
    - caption: CPU (%)
      statPath: DerivedStats.CPUPercentage
      color: blue
    - caption: Memory (%)
      statPath: DerivedStats.MemoryPercentage
      color: yellow

update:
  dockerRefreshInterval: 10000000000

reporting: "undetermined"
confirmOnQuit: false
