# Starship prompt - Catppuccin Mocha theme

format = """$directory$git_branch$git_status$line_break$character"""

right_format = """$cmd_duration$python$hostname$time"""

add_newline = true

[character]
success_symbol = "[❯](bold #CBA6F7)"
error_symbol = "[❯](bold #F38BA8)"

[directory]
style = "bold #89B4FA"
truncation_length = 3
format = "[$path]($style) "

[git_branch]
symbol = ""
style = "#6C7086"
format = "[$branch]($style) "

[git_status]
style = "#6C7086"
format = "([\\[$all_status$ahead_behind\\]]($style))"
ahead = "⇡"
behind = "⇣"
diverged = "⇡⇣"
conflicted = "="
up_to_date = ""
untracked = "?"
modified = "*"
staged = "+"
renamed = "»"
deleted = "✘"

[cmd_duration]
min_time = 5000
style = "#F9E2AF"
format = "[$duration]($style) "

[python]
style = "#6C7086"
format = "[$virtualenv]($style) "
symbol = ""

[hostname]
style = "#6C7086"
format = "[$ssh_symbol$hostname]($style) "
ssh_only = true

[time]
disabled = false
style = "#6C7086"
time_format = "%H:%M:%S"
format = "[$time]($style) "
